<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签列表动画效果预览</title>
    <style>
        /* 导入部分样式来预览动画效果 */
        :root {
            --sb-background: #ffffff;
            --sb-foreground: #0f172a;
            --sb-muted: #f8fafc;
            --sb-muted-foreground: #64748b;
            --sb-border: #e2e8f0;
            --sb-accent: #f1f5f9;
            --sb-ring: #3b82f6;
            --sb-ring-light: rgba(59, 130, 246, 0.08);
            --sb-radius: 8px;
        }

        /* 动画关键帧 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInFromLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        .preview-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--sb-background);
            border-radius: var(--sb-radius);
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .preview-title {
            text-align: center;
            color: var(--sb-foreground);
            margin-bottom: 20px;
        }

        .smart-bookmark-folder-item,
        .smart-bookmark-bookmark-item {
            padding: 12px;
            border-radius: calc(var(--sb-radius) - 2px);
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            transition: all 0.2s ease;
            background: transparent;
            border: 1px solid transparent;
            position: relative;
            box-sizing: border-box;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(12px);
        }

        .smart-bookmark-folder-item:hover,
        .smart-bookmark-bookmark-item:hover {
            background: var(--sb-accent);
        }

        .smart-bookmark-folder-item.animate-slide {
            animation: slideInFromLeft 0.3s ease forwards;
        }

        .smart-bookmark-bookmark-item.animate-in {
            animation: fadeInUp 0.3s ease forwards;
        }

        .smart-bookmark-folder-icon,
        .smart-bookmark-bookmark-icon {
            margin-right: 12px;
            margin-top: 2px;
            font-size: 16px;
            color: var(--sb-muted-foreground);
            flex-shrink: 0;
        }

        .folder-content,
        .bookmark-content {
            flex: 1;
            min-width: 0;
        }

        .folder-name,
        .bookmark-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--sb-foreground);
            margin-bottom: 4px;
        }

        .bookmark-url {
            font-size: 12px;
            color: var(--sb-muted-foreground);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .test-button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: var(--sb-ring);
            color: white;
            border: none;
            border-radius: var(--sb-radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .test-button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <h2 class="preview-title">📁 书签列表动画效果预览</h2>
        
        <div id="list-container">
            <!-- 文件夹示例 -->
            <div class="smart-bookmark-folder-item">
                <div class="smart-bookmark-folder-icon">📁</div>
                <div class="folder-content">
                    <div class="folder-name">工作项目</div>
                </div>
            </div>

            <div class="smart-bookmark-folder-item">
                <div class="smart-bookmark-folder-icon">📁</div>
                <div class="folder-content">
                    <div class="folder-name">学习资料</div>
                </div>
            </div>

            <!-- 书签示例 -->
            <div class="smart-bookmark-bookmark-item">
                <div class="smart-bookmark-bookmark-icon">🔖</div>
                <div class="bookmark-content">
                    <div class="bookmark-title">GitHub - 智能书签扩展</div>
                    <div class="bookmark-url">https://github.com/example/smart-bookmark</div>
                </div>
            </div>

            <div class="smart-bookmark-bookmark-item">
                <div class="smart-bookmark-bookmark-icon">🔖</div>
                <div class="bookmark-content">
                    <div class="bookmark-title">CSS 动画教程</div>
                    <div class="bookmark-url">https://developer.mozilla.org/docs/web/css/animation</div>
                </div>
            </div>

            <div class="smart-bookmark-bookmark-item">
                <div class="smart-bookmark-bookmark-icon">🔖</div>
                <div class="bookmark-content">
                    <div class="bookmark-title">JavaScript 性能优化</div>
                    <div class="bookmark-url">https://web.dev/performance</div>
                </div>
            </div>
        </div>

        <button class="test-button" onclick="testAnimation()">🎬 测试动画效果</button>
    </div>

    <script>
        function testAnimation() {
            const items = document.querySelectorAll('.smart-bookmark-folder-item, .smart-bookmark-bookmark-item');
            
            // 重置所有动画
            items.forEach(item => {
                item.classList.remove('animate-in', 'animate-slide');
                item.style.animationDelay = '';
                item.style.opacity = '0';
                item.style.transform = 'translateY(12px)';
            });

            // 延迟后添加动画
            setTimeout(() => {
                items.forEach((item, index) => {
                    const delay = index * 30; // 30ms 交错延迟
                    item.style.animationDelay = delay + 'ms';
                    
                    if (item.classList.contains('smart-bookmark-folder-item')) {
                        item.classList.add('animate-slide');
                    } else {
                        item.classList.add('animate-in');
                    }
                });
            }, 100);
        }

        // 页面加载时自动播放一次动画
        window.addEventListener('load', () => {
            setTimeout(testAnimation, 500);
        });
    </script>
</body>
</html>
