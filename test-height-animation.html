<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal高度动画测试</title>
    <link rel="stylesheet" href="src/styles/modal.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .demo-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20000;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .demo-btn {
            display: block;
            width: 100%;
            padding: 12px 20px;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .demo-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        
        .demo-btn.secondary {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.8) 100%);
            color: #374151;
            border: 1px solid rgba(209, 213, 219, 0.8);
        }
        
        .demo-info {
            margin-top: 15px;
            font-size: 12px;
            color: #64748b;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button class="demo-btn" onclick="toggleModal()">显示/隐藏 Modal</button>
        <button class="demo-btn secondary" onclick="simulateSearch('全部')">显示全部项目</button>
        <button class="demo-btn secondary" onclick="simulateSearch('工作')">搜索"工作"</button>
        <button class="demo-btn secondary" onclick="simulateSearch('学习')">搜索"学习"</button>
        <button class="demo-btn secondary" onclick="simulateSearch('xyz')">搜索无结果</button>
        <button class="demo-btn secondary" onclick="clearSearch()">清空搜索</button>
        <button class="demo-btn" onclick="toggleDarkMode()">切换深色模式</button>
        
        <div class="demo-info">
            ✨ 观察搜索时Modal高度的优雅动画效果<br>
            🎭 项目淡入淡出动画<br>
            📏 高度自适应过渡<br>
            🌊 阴影同步变化
        </div>
    </div>

    <div class="smart-bookmark-modal active" id="test-modal">
        <div class="smart-bookmark-modal-header">
            <h2 class="smart-bookmark-modal-title">高度动画测试</h2>
            <div class="smart-bookmark-header-controls">
                <button id="smart-bookmark-dark-mode-toggle" class="smart-bookmark-dark-mode-toggle" title="主题设置">🌙</button>
            </div>
        </div>
        
        <div class="smart-bookmark-modal-body">
            <input type="text" class="smart-bookmark-search" placeholder="搜索测试..." id="search-input">
            <div class="smart-bookmark-list-container">
                <ul class="smart-bookmark-bookmark-list" id="bookmark-list">
                    <!-- 初始项目会通过JavaScript动态添加 -->
                </ul>
            </div>
        </div>
        
        <div class="smart-bookmark-modal-footer">
            <div class="smart-bookmark-keyboard-hints">
                <span class="smart-bookmark-keyboard-hint">动画测试</span>
                <span class="smart-bookmark-keyboard-hint">高度自适应</span>
            </div>
            <div class="smart-bookmark-footer-buttons">
                <button class="smart-bookmark-btn smart-bookmark-btn-secondary">取消</button>
                <button class="smart-bookmark-btn smart-bookmark-btn-primary">确认</button>
            </div>
        </div>
    </div>

    <script>
        // 模拟书签数据
        const bookmarkData = [
            { icon: '💼', title: '工作相关 - 项目管理工具', url: 'https://work-tools.example.com' },
            { icon: '📊', title: '工作 - 数据分析报表', url: 'https://analytics.example.com' },
            { icon: '📚', title: '学习资源 - 编程教程', url: 'https://coding-tutorials.example.com' },
            { icon: '🎓', title: '学习 - 在线课程平台', url: 'https://online-courses.example.com' },
            { icon: '🌟', title: '设计灵感收集', url: 'https://design-inspiration.example.com' },
            { icon: '🎵', title: '音乐播放器', url: 'https://music-player.example.com' },
            { icon: '🍕', title: '美食外卖平台', url: 'https://food-delivery.example.com' },
            { icon: '🌐', title: '新闻资讯网站', url: 'https://news-site.example.com' },
            { icon: '🛒', title: '购物网站', url: 'https://shopping.example.com' },
            { icon: '🎮', title: '游戏平台', url: 'https://gaming.example.com' }
        ];

        let currentBookmarks = [...bookmarkData];
        let isModalVisible = true;

        function createBookmarkHTML(bookmark) {
            return `
                <li class="smart-bookmark-bookmark-item">
                    <div class="smart-bookmark-bookmark-content">
                        <span class="smart-bookmark-bookmark-icon">${bookmark.icon}</span>
                        <div class="smart-bookmark-bookmark-text">
                            <div class="smart-bookmark-bookmark-title-container">
                                <span class="smart-bookmark-bookmark-title">${bookmark.title}</span>
                            </div>
                            <div class="smart-bookmark-bookmark-url">${bookmark.url}</div>
                        </div>
                    </div>
                </li>
            `;
        }

        function updateBookmarkList(bookmarks, animate = true) {
            const modal = document.getElementById('test-modal');
            const list = document.getElementById('bookmark-list');
            
            if (animate) {
                // 添加内容变化动画类
                modal.classList.add('content-changing');
                
                // 先让现有项目淡出
                const currentItems = list.querySelectorAll('.smart-bookmark-bookmark-item');
                currentItems.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('item-fade-out');
                    }, index * 50);
                });
                
                // 等待淡出完成后更新内容
                setTimeout(() => {
                    list.innerHTML = bookmarks.map(createBookmarkHTML).join('');
                    
                    // 让新项目淡入
                    const newItems = list.querySelectorAll('.smart-bookmark-bookmark-item');
                    newItems.forEach((item, index) => {
                        item.style.opacity = '0';
                        item.style.transform = 'translateY(20px) scale(0.95)';
                        setTimeout(() => {
                            item.classList.add('item-fade-in');
                        }, index * 80);
                    });
                    
                    // 移除动画类
                    setTimeout(() => {
                        modal.classList.remove('content-changing');
                    }, 600);
                }, 400);
            } else {
                list.innerHTML = bookmarks.map(createBookmarkHTML).join('');
            }
        }

        function simulateSearch(query) {
            const searchInput = document.getElementById('search-input');
            searchInput.value = query;
            
            let filteredBookmarks;
            if (query === '全部') {
                filteredBookmarks = [...bookmarkData];
            } else {
                filteredBookmarks = bookmarkData.filter(bookmark => 
                    bookmark.title.toLowerCase().includes(query.toLowerCase())
                );
            }
            
            currentBookmarks = filteredBookmarks;
            updateBookmarkList(filteredBookmarks, true);
            
            console.log(`搜索"${query}"，找到 ${filteredBookmarks.length} 个结果`);
        }

        function clearSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.value = '';
            currentBookmarks = [...bookmarkData];
            updateBookmarkList(bookmarkData, true);
        }

        function toggleModal() {
            const modal = document.getElementById('test-modal');
            modal.classList.toggle('active');
            isModalVisible = !isModalVisible;
        }
        
        function toggleDarkMode() {
            const modal = document.getElementById('test-modal');
            modal.classList.toggle('dark-mode');
            
            const toggleBtn = document.getElementById('smart-bookmark-dark-mode-toggle');
            if (modal.classList.contains('dark-mode')) {
                toggleBtn.textContent = '☀️';
                document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)';
            } else {
                toggleBtn.textContent = '🌙';
                document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateBookmarkList(bookmarkData, false);
            
            // 搜索输入事件
            document.getElementById('search-input').addEventListener('input', function(e) {
                const query = e.target.value;
                if (query.trim() === '') {
                    clearSearch();
                } else {
                    simulateSearch(query);
                }
            });
        });

        // 添加项目点击效果
        document.addEventListener('click', function(e) {
            if (e.target.closest('.smart-bookmark-bookmark-item')) {
                const items = document.querySelectorAll('.smart-bookmark-bookmark-item');
                items.forEach(item => item.classList.remove('active'));
                e.target.closest('.smart-bookmark-bookmark-item').classList.add('active');
            }
        });
    </script>
</body>
</html>
