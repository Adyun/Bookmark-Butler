<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Butler</title>
    <link rel="stylesheet" href="src/styles/modal.css">
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 222.2 84% 4.9%;
            --primary: 221.2 83.2% 53.3%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96%;
            --accent-foreground: 222.2 84% 4.9%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 221.2 83.2% 53.3%;
            --radius: 0.5rem;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        .fallback-container {
            background: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: calc(var(--radius) * 2);
            padding: 48px 32px;
            max-width: 420px;
            width: 100%;
            margin: 16px;
            text-align: center;
            box-shadow: 0 10px 25px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        
        .fallback-icon {
            font-size: 48px;
            margin-bottom: 24px;
            filter: grayscale(0.3);
        }
        
        .fallback-title {
            font-size: 24px;
            font-weight: 600;
            color: hsl(var(--foreground));
            margin: 0 0 16px 0;
            letter-spacing: -0.025em;
        }
        
        .fallback-message {
            font-size: 14px;
            color: hsl(var(--muted-foreground));
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .fallback-message code {
            background: hsl(var(--muted));
            padding: 0.125rem 0.25rem;
            border-radius: calc(var(--radius) * 0.5);
            font-size: 0.875em;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
        }
        
        .fallback-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .fallback-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease-in-out;
            cursor: pointer;
            padding: 10px 16px;
            height: 40px;
            border: 1px solid transparent;
            outline: none;
            user-select: none;
        }

        .fallback-button:focus-visible {
            outline: 2px solid hsl(var(--ring));
            outline-offset: 2px;
        }
        
        .fallback-button.primary {
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
        }

        .fallback-button.primary:hover {
            background: hsl(var(--primary) / 0.9);
        }
        
        .fallback-button.secondary {
            background: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
            border-color: hsl(var(--border));
        }

        .fallback-button.secondary:hover {
            background: hsl(var(--secondary) / 0.8);
        }

        @media (max-width: 480px) {
            .fallback-container {
                padding: 32px 24px;
                margin: 12px;
            }
            
            .fallback-buttons {
                flex-direction: column;
            }
            
            .fallback-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="fallback-container">
        <div class="fallback-icon">📚</div>
        <h1 class="fallback-title" data-i18n="fallbackTitle">Bookmark Butler</h1>
        <p class="fallback-message" data-i18n-html="fallbackMessage">
            This page does not support Bookmark Butler.<br>
            Use this feature on a regular webpage, or use one of the fallback actions below.
        </p>
        <div class="fallback-buttons">
            <button class="fallback-button primary" data-i18n="fallbackOpenBing">Open Bing</button>
            <button class="fallback-button secondary" data-i18n="fallbackClose">Close</button>
        </div>
    </div>

    <script src="fallback.js"></script>
</body>
</html>
